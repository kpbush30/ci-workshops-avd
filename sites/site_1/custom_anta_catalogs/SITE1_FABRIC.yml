anta.tests.software:

  # Verifies the device is running one of the allowed EOS version.
  - VerifyEOSVersion: 
      versions:       # List of allowed EOS versions.
        - 4.32.0F-36401836.4320F (engineering build)

  # Verifies the device is running one of the allowed TerminAttr version.
  - VerifyTerminAttrVersion:
      versions:       # List of allowed TerminAttr versions.
        - v1.32.0

# Verifies the device has certain route in routing table
anta.tests.routing:
  generic:
    - VerifyRoutingTableEntry:
        vrf: default
        routes:
          - 0.0.0.0/0

# Verifies the device has Latency Analyzer Enabled (will skip)
anta.tests.lanz:
  - VerifyLANZ:
